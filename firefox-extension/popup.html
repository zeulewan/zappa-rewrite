<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zappa Rewrite</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <div>
          <h1>Zappa Rewrite</h1>
          <p>Local-first Firefox page rewriting.</p>
        </div>
        <label class="toggle-row">
          <span>Enabled</span>
          <input id="enabled" type="checkbox">
        </label>
      </header>

      <section class="card">
        <h2>This Website</h2>
        <p id="current-site" class="muted">Looking up current tab...</p>
        <button id="toggle-site" type="button">Disable on this website</button>
      </section>

      <section class="card">
        <h2>Backend</h2>
        <form id="settings-form">
          <label>
            <span>Backend</span>
            <select id="backend">
              <option value="ollama">Ollama</option>
              <option value="openai_compatible">OpenAI-compatible</option>
            </select>
          </label>

          <label>
            <span>Base URL</span>
            <input id="base-url" type="text" placeholder="http://127.0.0.1:11434">
          </label>

          <label>
            <span>Model</span>
            <input id="model" type="text" placeholder="qwen3:4b">
          </label>

          <label>
            <span>API Key</span>
            <input id="api-key" type="password" placeholder="Optional for local backends">
          </label>

          <label>
            <span>Max Input Chars</span>
            <input id="max-input-chars" type="number" min="1" step="1">
          </label>

          <label>
            <span>Max Output Tokens</span>
            <input id="max-output-tokens" type="number" min="1" step="1">
          </label>

          <div class="actions">
            <button type="submit">Save settings</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Disabled Sites</h2>
        <p class="muted">Requests from these top-level sites will bypass rewriting.</p>
        <ul id="disabled-sites" class="site-list"></ul>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
